global
    daemon
    maxconn 256

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

# Интерфейс для мониторинга (будет доступен на порту 8080)
listen stats
    bind *:8080
    stats enable
    stats uri /stats
    stats refresh 10s

# Фронтенд - принимает входящие запросы
frontend http_front
    bind *:8081
    default_backend http_back

# Бэкенд - серверы приложения
backend http_back
    balance roundrobin
    option httpchk GET /health
    server server1 127.0.0.1:3000 check inter 2000 rise 2 fall 3
    server server2 127.0.0.1:3001 check inter 2000 rise 2 fall 3
    server server3 127.0.0.1:3002 check backup