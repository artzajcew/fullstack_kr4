# Группа backend-серверов
upstream backend {
    # Основные серверы
    server 127.0.0.1:3000 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
    
    # Резервный сервер (включается, если оба основных недоступны)
    server 127.0.0.1:3002 backup;
}

server {
    listen 80;
    
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Эндпоинт для проверки статуса балансировщика
    location /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}